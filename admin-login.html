<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — XPLOSIVE Fitness</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">XPLOSIVE <span>FITNESS</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="admin-login.html" class="active">Admin</a>
    </div>
    <div class="menu-toggle"><span></span><span></span><span></span></div>
  </nav>

  <div class="admin-page">
    <div class="admin-login-box">
      <div class="admin-login-icon">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Admin Login</h1>
      <p>Enter admin credentials to access the control panel</p>
      <form id="admin-login-form">
        <div class="field"><input type="email" id="admin-email" placeholder=" " required><label>Admin Email</label></div>
        <div class="field">
          <div style="position:relative"><input type="password" id="admin-pass" placeholder=" " required style="padding-right:44px"><label>Password</label><button type="button" class="pw-toggle" id="admin-pass-t" aria-label="Toggle">&#x1F441;</button></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
      </form>
      <div id="admin-login-error" class="admin-error"></div>
    </div>
  </div>

  <script>
    document.querySelector('.menu-toggle')?.addEventListener('click', function() { this.classList.toggle('active'); document.querySelector('.nav-links')?.classList.toggle('active'); });
  </script>
  <script src="js/admin.js"></script>
</body>
</html>
